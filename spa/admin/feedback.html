<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Admin — ServePoint Spa</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --card: #1a1a26;
      --accent: #8B6DFF;
      --accent-dark: #6C3DE8;
      --red: #F87171;
      --green: #22C55E;
      --yellow: #F59E0B;
      --blue: #60A5FA;
      --text: #f1f1f5;
      --muted: #9090aa;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      padding: 18px 24px; display: flex; align-items: center; gap: 16px;
    }
    .header h1 { font-size: 18px; font-weight: 800; color: #fff; }
    .header h1 span { opacity: 0.85; font-weight: 600; }
    .user-email { font-size: 12px; color: rgba(255,255,255,0.85); }
    .logout-btn {
      margin-left: auto; padding: 7px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.4); background: transparent;
      color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.12); }

    #auth-gate {
      max-width: 400px; margin: 80px auto; padding: 36px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); text-align: center;
    }
    #auth-gate h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    #auth-gate p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 10px; background: #fff;
      color: #111; border: none; border-radius: 10px; padding: 12px 24px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google svg { width: 18px; height: 18px; }

    #app { display: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    #feed { display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .card.status-new { border-left: 3px solid var(--yellow); }
    .card.status-done { border-left: 3px solid var(--green); opacity: 0.7; }
    .card-top { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-bug { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-feature { background: rgba(139,109,255,0.18); color: var(--accent); }
    .badge-new { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
    .card-message { font-size: 14px; line-height: 1.6; color: var(--text); flex: 1 1 100%; }
    .card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .card-actions { display: flex; gap: 8px; margin-left: auto; }
    .action-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { background: var(--green); color: #111; border-color: var(--green); }
    .action-btn.done { background: rgba(34,197,94,0.1); color: var(--green); border-color: var(--green); }
    .action-btn.delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

    .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(139,109,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>ServePoint Spa — Feedback <span>Admin</span></h1>
    <span class="user-email" id="user-email"></span>
    <button class="logout-btn" id="logout-btn" style="display:none">Sign out</button>
  </div>

  <div id="auth-gate">
    <h2>Restricted access</h2>
    <p>Sign in with your ServePoint admin Google account to view feedback.</p>
    <button class="btn-google" id="sign-in-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <div id="app">
    <div class="main">
      <div class="stats">
        <div class="stat-card"><div class="stat-number" id="stat-total">—</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--yellow)" id="stat-new">—</div><div class="stat-label">New</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--red)" id="stat-bugs">—</div><div class="stat-label">Bugs</div></div>
        <div class="stat-card"><div class="stat-number" style="color:var(--accent)" id="stat-features">—</div><div class="stat-label">Suggestions</div></div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="bug">🐛 Bugs</button>
        <button class="filter-btn" data-filter="feature">💡 Suggestions</button>
        <button class="filter-btn" data-filter="new">🔔 New</button>
        <button class="filter-btn" data-filter="done">✓ Resolved</button>
      </div>

      <div id="feed">
        <div class="state-msg"><div class="spinner"></div><p>Loading…</p></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, orderBy, query }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC5bqVNCAJ2zx_cwK9OhmwQFGRaQRBMg-4",
      authDomain: "servepoint-spa.firebaseapp.com",
      projectId: "servepoint-spa",
      storageBucket: "servepoint-spa.firebasestorage.app",
      messagingSenderId: "462468606743",
      appId: "1:462468606743:web:a5b93c0cf151f488be2552"
    };

    const ADMIN_EMAILS = ['mobilestudio66@gmail.com', 'digiforcebusiness@gmail.com'];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authGate = document.getElementById('auth-gate');
    const appEl = document.getElementById('app');
    const feed = document.getElementById('feed');
    const logoutBtn = document.getElementById('logout-btn');
    const userEmailEl = document.getElementById('user-email');

    let allItems = [];
    let activeFilter = 'all';
    let unsubscribe = null;

    document.getElementById('sign-in-btn').addEventListener('click', async () => {
      try { await signInWithPopup(auth, new GoogleAuthProvider()); }
      catch (e) { alert('Sign-in error: ' + e.message); }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, user => {
      if (user && ADMIN_EMAILS.includes(user.email)) {
        authGate.style.display = 'none';
        appEl.style.display = 'block';
        logoutBtn.style.display = '';
        userEmailEl.textContent = user.email;
        startListening();
      } else {
        authGate.style.display = '';
        appEl.style.display = 'none';
        logoutBtn.style.display = 'none';
        userEmailEl.textContent = '';
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
        if (user) { signOut(auth); alert('Access denied. This account is not authorized.'); }
      }
    });

    function startListening() {
      const q = query(collection(db, 'feedback'), orderBy('createdAt', 'desc'));
      unsubscribe = onSnapshot(q, snap => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateStats();
        renderFeed();
      }, err => {
        feed.innerHTML = `<div class="state-msg"><p style="color:var(--red)">Error: ${err.message}</p></div>`;
      });
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = allItems.length;
      document.getElementById('stat-new').textContent = allItems.filter(i => i.status === 'new').length;
      document.getElementById('stat-bugs').textContent = allItems.filter(i => i.type === 'bug').length;
      document.getElementById('stat-features').textContent = allItems.filter(i => i.type === 'feature').length;
    }

    const LOCALES = { en: '🇬🇧 English', fr: '🇫🇷 French', es: '🇪🇸 Spanish', ar: '🇲🇦 Arabic' };

    function renderFeed() {
      let items = allItems;
      if (activeFilter === 'bug') items = items.filter(i => i.type === 'bug');
      else if (activeFilter === 'feature') items = items.filter(i => i.type === 'feature');
      else if (activeFilter === 'new') items = items.filter(i => i.status === 'new');
      else if (activeFilter === 'done') items = items.filter(i => i.status === 'done');

      if (items.length === 0) {
        feed.innerHTML = `<div class="state-msg"><p>No feedback in this category.</p></div>`;
        return;
      }

      feed.innerHTML = items.map(item => {
        const isBug = item.type === 'bug';
        const isDone = item.status === 'done';
        const date = item.createdAt?.toDate?.() ?? null;
        const dateStr = date
          ? date.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
          : '—';
        const localeLabel = LOCALES[item.locale] || item.locale || '—';

        return `
          <div class="card status-${isDone ? 'done' : 'new'}" data-id="${item.id}">
            <div class="card-top">
              <span class="badge badge-${isBug ? 'bug' : 'feature'}">${isBug ? '🐛 Bug' : '💡 Suggestion'}</span>
              <span class="badge badge-${isDone ? 'done' : 'new'}">${isDone ? '✓ Resolved' : '🔔 New'}</span>
              <div class="card-message">${escHtml(item.message || '')}</div>
            </div>
            <div class="card-meta">
              <span class="meta-item">📅 ${dateStr}</span>
              <span class="meta-item">${localeLabel}</span>
              ${item.uid ? `<span class="meta-item" title="${escHtml(item.uid)}">👤 ${escHtml(item.uid.slice(0, 8))}…</span>` : ''}
              <div class="card-actions">
                <button class="action-btn ${isDone ? 'done' : ''}" onclick="toggleStatus('${item.id}', '${item.status}')">
                  ${isDone ? '↩ Reopen' : '✓ Mark resolved'}
                </button>
                <button class="action-btn delete" onclick="deleteItem('${item.id}')">🗑</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    window.toggleStatus = async (id, currentStatus) => {
      const newStatus = currentStatus === 'done' ? 'new' : 'done';
      try { await updateDoc(doc(db, 'feedback', id), { status: newStatus }); }
      catch (e) { alert('Error: ' + e.message); }
    };

    window.deleteItem = async (id) => {
      if (!confirm('Delete this feedback?')) return;
      try { await deleteDoc(doc(db, 'feedback', id)); }
      catch (e) { alert('Error: ' + e.message); }
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderFeed();
      });
    });

    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
