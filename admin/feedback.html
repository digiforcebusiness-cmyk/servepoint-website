<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Admin — ServePoint</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/icon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D2137;
      --card: #132A45;
      --card2: #0F2236;
      --accent: #E94560;
      --green: #22C55E;
      --yellow: #F59E0B;
      --blue: #60A5FA;
      --text: #F0F4F8;
      --muted: #7A8FA6;
      --border: rgba(255,255,255,0.07);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────────── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .header-logo img { border-radius: 8px; }
    .header-logo span { font-size: 18px; font-weight: 700; }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--muted);
    }
    .header h1 span { color: var(--accent); }

    /* ─── Auth gate ──────────────────────────────────────── */
    #auth-gate {
      max-width: 400px;
      margin: 80px auto;
      padding: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    #auth-gate h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #auth-gate p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: white;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google svg { width: 18px; height: 18px; }

    /* ─── Main ───────────────────────────────────────────── */
    #app { display: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ─── Stats row ──────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ─── Filters ────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .filter-btn.type-bug.active { background: var(--accent); border-color: var(--accent); }
    .filter-btn.type-feature.active { background: var(--blue); border-color: var(--blue); }
    .filter-btn.status-new.active { background: var(--yellow); border-color: var(--yellow); color: #111; }
    .filter-btn.status-done.active { background: var(--green); border-color: var(--green); color: #111; }

    /* ─── Feed ───────────────────────────────────────────── */
    #feed { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .card.status-new { border-left: 3px solid var(--yellow); }
    .card.status-done { border-left: 3px solid var(--green); opacity: 0.7; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-bug { background: rgba(233,69,96,0.15); color: var(--accent); }
    .badge-feature { background: rgba(96,165,250,0.15); color: var(--blue); }
    .badge-new { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }

    .card-message {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      flex: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .meta-item {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-actions { display: flex; gap: 8px; margin-left: auto; }
    .action-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn:hover { background: var(--green); color: #111; border-color: var(--green); }
    .action-btn.done { background: rgba(34,197,94,0.1); color: var(--green); border-color: var(--green); }
    .action-btn.done:hover { background: rgba(233,69,96,0.1); color: var(--accent); border-color: var(--accent); }
    .action-btn.delete:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* ─── Empty / loading ────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(233,69,96,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Logout ─────────────────────────────────────────── */
    .logout-btn {
      margin-left: auto;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    .user-email { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="header-logo">
      <img src="/app_icon.png" alt="ServePoint" width="32" height="32">
      <span>ServePoint</span>
    </a>
    <h1>Feedback <span>Admin</span></h1>
    <span class="user-email" id="user-email"></span>
    <button class="logout-btn" id="logout-btn" style="display:none">Se déconnecter</button>
  </div>

  <!-- Auth gate -->
  <div id="auth-gate">
    <h2>Accès restreint</h2>
    <p>Connectez-vous avec votre compte Google ServePoint pour accéder au tableau de bord des feedbacks.</p>
    <button class="btn-google" id="sign-in-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>
  </div>

  <!-- Main app -->
  <div id="app">
    <div class="main">

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">—</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--yellow)" id="stat-new">—</div>
          <div class="stat-label">Nouveaux</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--accent)" id="stat-bugs">—</div>
          <div class="stat-label">Bugs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--blue)" id="stat-features">—</div>
          <div class="stat-label">Suggestions</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn type-bug" data-filter="bug">🐛 Bugs</button>
        <button class="filter-btn type-feature" data-filter="feature">💡 Suggestions</button>
        <button class="filter-btn status-new" data-filter="new">🔔 Nouveaux</button>
        <button class="filter-btn status-done" data-filter="done">✓ Traités</button>
      </div>

      <!-- Feed -->
      <div id="feed">
        <div class="state-msg"><div class="spinner"></div><p>Chargement...</p></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, orderBy, query }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAAIJ8bI66QDixcj5-f4CnuGvosu_R6Mz0",
      authDomain: "servepoint-16302.firebaseapp.com",
      projectId: "servepoint-16302",
      storageBucket: "servepoint-16302.firebasestorage.app",
      messagingSenderId: "984531213248",
      appId: "1:984531213248:web:3487ca37bd57cddd568625"
    };

    // Allowed admin emails
    const ADMIN_EMAILS = ['mobilestudio66@gmail.com', 'digiforcebusiness@gmail.com'];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authGate = document.getElementById('auth-gate');
    const appEl = document.getElementById('app');
    const feed = document.getElementById('feed');
    const logoutBtn = document.getElementById('logout-btn');
    const userEmailEl = document.getElementById('user-email');

    let allItems = [];
    let activeFilter = 'all';
    let unsubscribe = null;

    // ─── Auth ─────────────────────────────────────────────────

    document.getElementById('sign-in-btn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        alert('Erreur de connexion: ' + e.message);
      }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, user => {
      if (user && ADMIN_EMAILS.includes(user.email)) {
        authGate.style.display = 'none';
        appEl.style.display = 'block';
        logoutBtn.style.display = '';
        userEmailEl.textContent = user.email;
        startListening();
      } else {
        authGate.style.display = '';
        appEl.style.display = 'none';
        logoutBtn.style.display = 'none';
        userEmailEl.textContent = '';
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
        if (user) {
          signOut(auth);
          alert('Accès refusé. Ce compte n\'est pas autorisé.');
        }
      }
    });

    // ─── Realtime listener ────────────────────────────────────

    function startListening() {
      const q = query(collection(db, 'feedback'), orderBy('createdAt', 'desc'));
      unsubscribe = onSnapshot(q, snap => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateStats();
        renderFeed();
      }, err => {
        feed.innerHTML = `<div class="state-msg"><p style="color:var(--accent)">Erreur: ${err.message}</p></div>`;
      });
    }

    // ─── Stats ────────────────────────────────────────────────

    function updateStats() {
      document.getElementById('stat-total').textContent = allItems.length;
      document.getElementById('stat-new').textContent = allItems.filter(i => i.status === 'new').length;
      document.getElementById('stat-bugs').textContent = allItems.filter(i => i.type === 'bug').length;
      document.getElementById('stat-features').textContent = allItems.filter(i => i.type === 'feature').length;
    }

    // ─── Render ───────────────────────────────────────────────

    function renderFeed() {
      let items = allItems;

      if (activeFilter === 'bug') items = items.filter(i => i.type === 'bug');
      else if (activeFilter === 'feature') items = items.filter(i => i.type === 'feature');
      else if (activeFilter === 'new') items = items.filter(i => i.status === 'new');
      else if (activeFilter === 'done') items = items.filter(i => i.status === 'done');

      if (items.length === 0) {
        feed.innerHTML = `<div class="state-msg"><p>Aucun feedback dans cette catégorie.</p></div>`;
        return;
      }

      feed.innerHTML = items.map(item => {
        const isBug = item.type === 'bug';
        const isDone = item.status === 'done';
        const date = item.createdAt?.toDate?.() ?? null;
        const dateStr = date
          ? date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
          : '—';
        const localeLabel = item.locale === 'ar' ? '🇩🇿 Arabe' : '🇫🇷 Français';

        return `
          <div class="card status-${isDone ? 'done' : 'new'}" data-id="${item.id}">
            <div class="card-top">
              <span class="badge badge-${isBug ? 'bug' : 'feature'}">${isBug ? '🐛 Bug' : '💡 Suggestion'}</span>
              <span class="badge badge-${isDone ? 'done' : 'new'}">${isDone ? '✓ Traité' : '🔔 Nouveau'}</span>
              <div class="card-message">${escHtml(item.message || '')}</div>
            </div>
            <div class="card-meta">
              <span class="meta-item">📅 ${dateStr}</span>
              <span class="meta-item">${localeLabel}</span>
              ${item.uid ? `<span class="meta-item" title="${escHtml(item.uid)}">👤 ${escHtml(item.uid.slice(0, 8))}…</span>` : ''}
              <div class="card-actions">
                <button class="action-btn ${isDone ? 'done' : ''}" onclick="toggleStatus('${item.id}', '${item.status}')">
                  ${isDone ? '↩ Rouvrir' : '✓ Marquer traité'}
                </button>
                <button class="action-btn delete" onclick="deleteItem('${item.id}')">🗑</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ─── Actions ──────────────────────────────────────────────

    window.toggleStatus = async (id, currentStatus) => {
      const newStatus = currentStatus === 'done' ? 'new' : 'done';
      try {
        await updateDoc(doc(db, 'feedback', id), { status: newStatus });
      } catch (e) { alert('Erreur: ' + e.message); }
    };

    window.deleteItem = async (id) => {
      if (!confirm('Supprimer ce feedback ?')) return;
      try {
        await deleteDoc(doc(db, 'feedback', id));
      } catch (e) { alert('Erreur: ' + e.message); }
    };

    // ─── Filters ──────────────────────────────────────────────

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderFeed();
      });
    });

    // ─── Utils ────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
